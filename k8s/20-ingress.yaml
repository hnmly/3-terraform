# =============================================================================
# ALB Ingress (AWS Load Balancer Controller)
#   - 단일 엔드포인트(CloudFront)의 백엔드 오리진이 되는 ALB
#   - 경로 라우팅:
#       /v1/user*    -> user-svc
#       /v1/product* -> product-svc
#       /v1/stress*  -> stress-svc
#   - 그 외 정의되지 않은 경로 -> 404 고정응답 (문제: "API 외 요청은 404")
#       (※ 비정상/변조 요청 403 차단은 CloudFront WAF 에서 처리)
#   - target-type: ip (Pod 직접 등록, 성능/정확성)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  namespace: apps
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: apdev-alb
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # 헬스체크 (앱 공통 /healthcheck, 200)
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /healthcheck
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/success-codes: "200"
    # 정의되지 않은 모든 경로에 대한 404 고정응답 액션
    alb.ingress.kubernetes.io/actions.default-404: >
      {"type":"fixed-response","fixedResponseConfig":{"contentType":"application/json","statusCode":"404","messageBody":"{\"error\":\"not found\"}"}}
    # 부하 분산 알고리즘 (성능)
    alb.ingress.kubernetes.io/target-group-attributes: load_balancing.algorithm.type=least_outstanding_requests
    # (선택) CloudFront 단일 진입 강제를 위해 inbound 제한 권장 - README 참고
    # alb.ingress.kubernetes.io/inbound-cidrs: 0.0.0.0/0
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # --- 구체 경로 우선 ---
          - path: /v1/user
            pathType: Prefix
            backend:
              service:
                name: user-svc
                port:
                  number: 80
          - path: /v1/product
            pathType: Prefix
            backend:
              service:
                name: product-svc
                port:
                  number: 80
          - path: /v1/stress
            pathType: Prefix
            backend:
              service:
                name: stress-svc
                port:
                  number: 80
          # --- catch-all: 그 외 경로는 404 (반드시 마지막) ---
          - path: /
            pathType: Prefix
            backend:
              service:
                name: default-404
                port:
                  name: use-annotation
